                                <div className="absolute inset-0 bg-[#3B82F6]/10 rounded-full blur-3xl animate-pulse"></div>
                                <div className="w-28 h-28 md:w-36 md:h-36 rounded-full border-4 border-white p-1 relative bg-white shadow-xl overflow-hidden">
                                    <img src={CONTACTS.PROFILE_IMG} className="w-full h-full object-cover rounded-full" />
                                </div>
                            </div>
                            <h1 className="text-3xl md:text-5xl font-serif tracking-[0.15em] text-[#1E40AF] uppercase mb-1 font-bold">Lalin Space</h1>
                            <p className="text-[11px] md:text-sm tracking-[0.4em] text-[#60A5FA] uppercase font-extrabold opacity-90">Celestial Soul Guidance</p>
                        </header>

                        <nav className="flex justify-center flex-wrap gap-2 md:gap-4 mb-10">
                            {['home', 'about', 'reviews', 'queue'].map(t => (
                                <button
                                    key={t}
                                    onClick={() => setTab(t)}
                                    className={`text-[10px] md:text-xs tracking-[0.15em] uppercase transition-all px-6 py-2.5 rounded-full font-bold shadow-sm ${
                                        tab === t ? 'bg-[#3B82F6] text-white shadow-blue-200' : 'text-[#1E40AF] bg-white/70 hover:bg-white'
                                    }`}
                                >
                                    {t}
                                </button>
                            ))}
                        </nav>

                        <div className="flex-1">
                            {tab === 'home' && (
                                <div className="space-y-10 animate-in">
                                    <section className="bg-white/95 backdrop-blur-xl p-8 rounded-[2rem] border border-white shadow-md text-center max-w-2xl mx-auto">
                                        <p className="text-[14px] md:text-lg leading-relaxed font-semibold text-[#4B5563] italic">
                                            "ให้ท้องฟ้าสีครามและแสงดาว นำทางคุณไปสู่ความสงบและคำตอบภายในใจ"
                                        </p>
                                    </section>

                                    <section className="text-center">
                                        {fortune ? (
                                            <div className="bg-white p-10 rounded-[3rem] border-2 border-[#E0F2FE] shadow-2xl relative overflow-hidden max-w-sm mx-auto">
                                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-200 via-purple-200 to-pink-100"></div>
                                                <span className="text-7xl block mb-4 animate-bounce">{fortune.i}</span>
                                                <h4 className="text-xl tracking-widest text-[#1E40AF] font-bold uppercase font-serif mb-2">{fortune.n}</h4>
                                                <p className="text-base text-[#374151] font-medium">{fortune.m}</p>
                                                <button onClick={() => setFortune(null)} className="mt-8 text-xs font-bold text-[#3B82F6] underline uppercase">สุ่มใหม่</button>
                                            </div>
                                        ) : (
                                            <button onClick={draw} className="bg-[#3B82F6] text-white px-12 py-5 rounded-full font-bold shadow-lg hover:bg-[#2563EB] active:scale-95 transition-all text-sm md:text-base tracking-[0.2em] uppercase">
                                                Draw Daily Card
                                            </button>
                                        )}
                                    </section>

                                    <div className="space-y-6">
                                        <h3 className="text-xs tracking-[0.3em] uppercase text-[#3B82F6] font-extrabold text-center opacity-60">Services</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {SERVICES.map(s => (
                                                <a key={s.id} href={s.url || CONTACTS.LINE_URL} target="_blank" className="flex justify-between items-center bg-white/90 p-6 rounded-[2rem] border border-white shadow-sm hover:shadow-md transition-all group">
                                                    <div className="flex-1 pr-2">
                                                        <h4 className="text-base font-bold text-[#374151] group-hover:text-[#3B82F6] uppercase">{s.name}</h4>
                                                        <p className="text-xs text-[#6B7280] font-bold">{s.desc}</p>
                                                    </div>
                                                    <span className="text-lg font-extrabold text-[#3B82F6]">{s.price}</span>
                                                </a>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-4 pt-4 max-w-2xl mx-auto w-full text-center">
                                        <a href={CONTACTS.LINE_URL} target="_blank" className="flex items-center justify-center gap-2 w-full py-4 rounded-full text-sm font-bold bg-[#10B981] text-white shadow-lg uppercase transition-all hover:bg-[#059669]">
                                            ติดต่อสอบถาม Line : {CONTACTS.LINE_ID}
                                        </a>
                                        <div className="grid grid-cols-2 gap-3">
                                            <a href={CONTACTS.IG_URL} target="_blank" className="flex items-center justify-center gap-2 py-4 rounded-full text-[11px] font-bold border-2 border-[#E1306C] text-[#E1306C] bg-white/50 uppercase transition-all hover:bg-[#E1306C] hover:text-white">Instagram</a>
                                            <a href={CONTACTS.FB_URL} target="_blank" className="flex items-center justify-center gap-2 py-4 rounded-full text-[11px] font-bold border-2 border-[#1877F2] text-[#1877F2] bg-white/50 uppercase transition-all hover:bg-[#1877F2] hover:text-white">Facebook</a>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <a href={CONTACTS.TIKTOK_URL} target="_blank" className="flex items-center justify-center gap-2 py-4 rounded-full text-[11px] font-bold border-2 border-black text-black bg-white/50 uppercase transition-all hover:bg-black hover:text-white">TikTok</a>
                                            <a href={CONTACTS.X_URL} target="_blank" className="flex items-center justify-center gap-2 py-4 rounded-full text-[11px] font-bold border-2 border-[#000000] text-[#000000] bg-white/50 uppercase transition-all hover:bg-black hover:text-white">X (Twitter)</a>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {tab === 'about' && (
                                <div className="bg-white/80 backdrop-blur-xl p-10 rounded-[3rem] shadow-xl border border-white text-center animate-in">
                                    <h3 className="text-3xl font-bold text-[#1E40AF] font-serif uppercase tracking-widest mb-4">About Lalin</h3>
                                    <p className="text-xl font-bold text-[#1E40AF] mb-4">"สวัสดีค่ะ ยินดีต้อนรับสู่ LALIN SPACE นะคะ"</p>
                                    <p className="text-[#4B5563] leading-relaxed">ลลินพร้อมส่งต่อพลังงานดีๆ ผ่านศาสตร์แห่งดวงดาว เพื่อช่วยให้คุณพบความสงบและแนวทางที่ชัดเจนในชีวิต พร้อมดูแลด้วยหัวใจค่ะ</p>
                                </div>
                            )}

                            {tab === 'reviews' && (
                                <div className="bg-white p-8 rounded-[3rem] shadow-lg border border-blue-50 animate-in">
                                    <div className="flex gap-2 mb-8">
                                        <input 
                                            type="text" 
                                            value={newReview} 
                                            onChange={(e) => setNewReview(e.target.value)}
                                            placeholder="แชร์ความประทับใจ..." 
                                            className="w-full bg-[#F9FAFB] border-2 border-transparent focus:border-[#BAE6FD] rounded-full py-4 px-8 text-sm focus:outline-none transition-all shadow-inner font-medium" 
                                        />
                                        <button 
                                            onClick={() => {if(newReview.trim()){setReviews([{id:Date.now(), text:newReview}, ...reviews]); setNewReview("");}}}
                                            className="bg-[#3B82F6] text-white px-6 rounded-full font-bold hover:bg-[#2563EB]"
                                        >ส่ง</button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[500px] overflow-y-auto custom-scrollbar pr-2 text-left">
                                        {reviews.map(r => (
                                            <div key={r.id} className="bg-[#F0F9FF]/70 p-5 rounded-3xl border border-white shadow-sm">
                                                <div className="flex items-center gap-2 mb-2"><div className="w-2 h-2 rounded-full bg-[#3B82F6] flower-pulse"></div><span className="text-[10px] uppercase font-extrabold text-[#1E40AF]">Soul Feedback</span></div>
                                                <p className="text-sm text-[#4B5563] font-bold leading-relaxed italic">"{r.text}"</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {tab === 'queue' && (
                                <div className="bg-white/90 backdrop-blur-xl p-8 rounded-[3rem] shadow-xl border border-white space-y-6 text-center animate-in">
                                    <h3 className="text-3xl font-bold text-[#1E40AF] font-serif uppercase tracking-widest">Queue & Schedule</h3>
                                    <div className="relative w-full aspect-[4/5] md:aspect-video rounded-3xl overflow-hidden border border-blue-100 shadow-inner">
                                        <iframe src={CONTACTS.CALENDAR_URL} className="w-full h-full border-0" scrolling="no"></iframe>
                                    </div>
                                    <a href={CONTACTS.LINE_URL} target="_blank" className="flex items-center justify-center w-full py-5 rounded-full text-lg font-bold bg-[#10B981] text-white shadow-xl uppercase transition-all hover:bg-[#059669]">ติดต่อ จองคิว LINE : {CONTACTS.LINE_ID}</a>
                                </div>
                            )}
                        </div>

                        <footer className="mt-20 text-center">
                            <div className="text-[10px] tracking-[0.8em] uppercase text-[#1E40AF] font-extrabold opacity-60">LALIN SPACE © 2026</div>
                        </footer>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
